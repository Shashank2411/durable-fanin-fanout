name: Deploy Durable Function

on:
  push:
    branches:
      - main

env:
  RESOURCE_GROUP: durable-clean-rg
  LOCATION: centralindia
  FUNCTION_APP_NAME: durable-fanout-fanin-prod
  STORAGE_ACCOUNT_NAME: durablefanin${{ github.run_number }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Infrastructure
      run: |
        az deployment group create \
          --resource-group $RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters functionAppName=$FUNCTION_APP_NAME \
                       storageAccountName=$STORAGE_ACCOUNT_NAME

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Deploy Function Code
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.FUNCTION_APP_NAME }}
        package: '.'